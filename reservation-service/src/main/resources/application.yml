spring:
  application:
    name: reservation-service
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8085
  forward-headers-strategy: framework

springdoc:
  packages-to-scan: com.champsoft.concertbooking.reservation.api
  api-docs:
    path: /v3/api-docs
    resolve-schema-properties: true
  swagger-ui:
    url: /v3/api-docs
    config-url: /v3/api-docs/swagger-config
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

services:
  concerts:
    base-url: ${CONCERTS_BASE_URL:http://localhost:8081}
  customers:
    base-url: ${CUSTOMERS_BASE_URL:http://localhost:8082}
  showtimes:
    base-url: ${SHOWTIMES_BASE_URL:http://localhost:8083}